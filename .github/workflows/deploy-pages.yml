name: Deploy to GitHub Pages

# Deploys by pushing the build to the gh-pages branch (Pages "deploy
# from a branch" mode). The actions/deploy-pages artifact path failed
# repeatedly with an opaque backend "deployment_failed" for this site,
# so we use the classic branch-based path instead.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          force_orphan: true
