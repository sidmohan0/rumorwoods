name: Deploy to GitHub Pages

# Builds two variants onto one Pages site:
#   site root  <- main (v1, the stable checkpoint lineage)
#   site /v2/  <- v2   (experimental spin-off)
# Vite's relative base ("./") makes both builds subpath-safe. Each
# build gets VARIANT so the in-app version switcher links correctly.

on:
  push:
    branches: [main, v2]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: stable
      - uses: actions/checkout@v4
        with:
          ref: v2
          path: experimental
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: stable/package-lock.json
      - run: npm ci
        working-directory: stable
      - run: VARIANT=v1 npm run build
        working-directory: stable
      - run: npm ci
        working-directory: experimental
      - run: VARIANT=v2 npm run build
        working-directory: experimental
      - name: Assemble site
        run: |
          mkdir -p site/v2
          cp -R stable/dist/. site/
          cp -R experimental/dist/. site/v2/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          force_orphan: true
      # GitHub Pages' deployment backend fails intermittently with an
      # empty-description error on identical content that succeeds on
      # retry. Poll the build the gh-pages push triggered; if it errors
      # or wedges, request fresh builds until one lands.
      - name: Ensure Pages build lands (retry backend flakes)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          for attempt in 1 2 3 4 5; do
            echo "waiting for Pages build (attempt $attempt)…"
            for i in $(seq 1 18); do
              sleep 10
              status=$(gh api "repos/${{ github.repository }}/pages/builds/latest" --jq '.status' || echo unknown)
              if [ "$status" = "built" ]; then
                echo "Pages build succeeded"
                exit 0
              fi
              if [ "$status" = "errored" ]; then
                break
              fi
            done
            echo "build errored or wedged — requesting a fresh build"
            gh api -X POST "repos/${{ github.repository }}/pages/builds" || true
          done
          echo "Pages build did not land after 5 attempts"
          exit 1
